<html>
    <head>
        <link rel="stylesheet" href="estilo.css">
    </head>
    
    <body>
        <h1 id="titulo" class="cabecalho">Página Nova</h1>
        <div class="ocultar">
            <h2>Minha Primeira Div</h2>
            <button onclick="document.getElementById('titulo').style.display = 'none'">Oculta título</button>
        </div>

        <br>

        <div class="mostrar">
            <h2>Minha Segunda Div</h2>
            <button onclick="document.getElementById('titulo').style.display = 'block'">Mostra título</button>
        </div>
    </body>
</html>
